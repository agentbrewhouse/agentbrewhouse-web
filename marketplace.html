<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AgentBrewHouse - Agent Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0806;
  --amber: #c8832a;
  --amber-light: #e8a84a;
  --cream: #f0e6d0;
  --muted: #7a6a52;
  --border: rgba(200,131,42,0.22);
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--cream); font-family: 'DM Mono', monospace; overflow-x: hidden; }

/* Nav */
nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,8,6,0.95); backdrop-filter: blur(12px); z-index: 100; }
.nav-wordmark { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--cream); text-decoration: none; }
.nav-wordmark em { font-style: italic; color: var(--amber-light); }
.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a { font-size: 11px; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; text-decoration: none; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--amber-light); }
.hbar-ticker { display: flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 0.12em; color: var(--muted); }
.hbar-ticker .price { color: var(--amber-light); }
.hbar-ticker .dot { width: 6px; height: 6px; border-radius: 50%; background: #6abf7b; flex-shrink: 0; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Page header */
.page-header { padding: 72px 20px 56px; text-align: center; border-bottom: 1px solid var(--border); }
.page-eyebrow { font-size: 12px; letter-spacing: 0.35em; color: var(--amber); text-transform: uppercase; margin-bottom: 18px; }
.page-title { font-family: 'Playfair Display', serif; font-size: clamp(36px, 6vw, 64px); font-weight: 700; line-height: 1.05; margin-bottom: 18px; }
.page-title em { font-style: italic; color: var(--amber-light); }
.page-sub { font-size: 11px; letter-spacing: 0.08em; color: var(--muted); max-width: 480px; margin: 0 auto; line-height: 1.8; }
.rule { width: 50px; height: 1px; margin: 0 auto 18px; background: linear-gradient(to right, transparent, var(--amber), transparent); }

/* Filters */
.filters { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 32px 20px; border-bottom: 1px solid var(--border); }
.filter-btn { border: 1px solid var(--border); background: transparent; padding: 8px 18px; font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.2s; }
.filter-btn:hover { border-color: var(--amber); color: var(--amber-light); }
.filter-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(200,131,42,0.07); }

/* Grid */
.marketplace { padding: 56px 20px 90px; }
.marketplace-inner { max-width: 1160px; margin: 0 auto; }
.agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
@media(max-width: 680px) { .agent-grid { grid-template-columns: 1fr; } }

/* Agent card */
.agent-card {
  background: rgba(15,12,9,0.9);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  opacity: 0;
  animation: fadeup 0.5s ease forwards;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
}
.agent-card:hover {
  border-color: var(--card-accent);
  transform: translateY(-4px);
  box-shadow: 0 20px 56px rgba(0,0,0,0.6), 0 0 0 1px var(--card-accent);
}
/* Top accent bar */
.agent-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-accent);
  opacity: 0.65;
  transition: opacity 0.3s, height 0.3s;
}
.agent-card:hover::before { opacity: 1; }

/* Avatar zone */
.agent-avatar-zone {
  display: flex;
  align-items: center;
  padding: 22px 22px 20px;
  gap: 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.agent-avatar {
  width: 72px;
  height: 72px;
  border-radius: 3px;
  border: 1px solid var(--card-accent);
  background: rgba(255,255,255,0.03);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  overflow: hidden;
}
.agent-avatar svg { width: 100%; height: 100%; display: block; }
.agent-avatar img { width: 100%; height: 100%; object-fit: cover; }
.agent-avatar-info { flex: 1; min-width: 0; }
.agent-name {
  font-family: 'Playfair Display', serif;
  font-size: 21px;
  font-weight: 700;
  color: var(--cream);
  line-height: 1.15;
  margin-bottom: 8px;
}
.agent-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.agent-category {
  font-size: 8px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid var(--card-accent);
  color: var(--card-accent);
  background: rgba(255,255,255,0.02);
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #6abf7b;
  animation: blink 2.5s ease-in-out infinite;
}
.tier-badge {
  position: absolute;
  top: 14px; right: 14px;
  font-size: 7px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid;
  border-color: var(--tier-color, var(--muted));
  color: var(--tier-color, var(--muted));
}

/* Body */
.agent-body { padding: 18px 22px; flex: 1; display: flex; flex-direction: column; gap: 14px; }
.agent-desc {
  font-size: 11px;
  color: rgba(240,230,208,0.48);
  line-height: 1.85;
  letter-spacing: 0.03em;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: all 0.3s;
}
.agent-desc.expanded { -webkit-line-clamp: unset; }
.expand-btn {
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--card-accent);
  text-transform: uppercase;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  padding: 5px 0 0;
  display: inline-block;
  opacity: 0.8;
  transition: opacity 0.2s;
}
.expand-btn:hover { opacity: 1; }
.agent-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.agent-tag {
  font-size: 8px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
  border: 1px solid rgba(122,106,82,0.28);
  padding: 3px 7px;
  transition: border-color 0.2s;
}
.agent-card:hover .agent-tag { border-color: rgba(200,131,42,0.25); }

/* Footer */
.agent-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px 18px;
  border-top: 1px solid var(--border);
}
.agent-price { display: flex; flex-direction: column; gap: 3px; }
.hbar-row { display: flex; align-items: baseline; gap: 5px; }
.hbar-row strong {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: var(--card-accent);
  line-height: 1;
}
.hbar-row span { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
.usd-row { font-size: 9px; letter-spacing: 0.12em; color: var(--muted); }
.hire-btn {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--card-accent);
  border: none;
  padding: 12px 20px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-weight: bold;
  transition: opacity 0.2s, transform 0.15s;
  text-decoration: none;
  display: inline-block;
  white-space: nowrap;
}
.hire-btn:hover { opacity: 0.85; transform: scale(1.03); }
.hire-btn.disabled { opacity: 0.3; cursor: default; pointer-events: none; }

/* States */
.state { text-align: center; padding: 80px 20px; }
.spinner { display: inline-block; width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.state-icon { font-size: 42px; margin-bottom: 20px; display: block; }
.state-title { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 12px; color: var(--cream); }
.state-body { font-size: 11px; color: var(--muted); line-height: 1.8; letter-spacing: 0.06em; }

.agent-count { font-size: 9px; letter-spacing: 0.25em; color: var(--muted); text-align: center; margin-bottom: 36px; text-transform: uppercase; }
.agent-count span { color: var(--amber); }

footer { text-align: center; padding: 28px 20px; font-size: 9px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; border-top: 1px solid rgba(200,131,42,0.08); }

@keyframes fadeup { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

    <circle cx="32" cy="25" r="11" fill="#c8956a"/>
    <!-- Hair severe side part -->
    <path d="M20 19 Q24 11 34 13 Q40 11 43 19 Q40 14 34 15 Q28 11 20 19Z" fill="#1a0a0a"/>
    <!-- Monocle -->
    <circle cx="36" cy="24" r="5" fill="none" stroke="#d4a07e" stroke-width="1.5"/>
    <line x1="40" y1="27" x2="43" y2="30" stroke="#d4a07e" stroke-width="1"/>
    <!-- Eyes - one magnified through monocle -->
    <circle cx="28" cy="25" r="1.8" fill="#1a0a0a"/>
    <circle cx="36" cy="24" r="2.5" fill="#1a0a0a"/>
    <circle cx="36.5" cy="23.5" r="0.8" fill="white"/>
    <!-- Stern expression -->
    <path d="M27 31 Q32 30 37 31" stroke="#7a4a2a" stroke-width="1.5" fill="none"/>
    <path d="M25 21 Q27 19 30 21" stroke="#3a1a0a" stroke-width="1.5" fill="none"/>
    <!-- Clipboard -->
    <rect x="10" y="40" width="14" height="16" rx="1" fill="#f0e6d0"/>
    <rect x="14" y="37" width="6" height="4" rx="1" fill="#c8a878"/>
    <line x1="12" y1="46" x2="22" y2="46" stroke="#c8a878" stroke-width="1"/>
    <line x1="12" y1="49" x2="22" y2="49" stroke="#c8a878" stroke-width="1"/>
    <line x1="12" y1="52" x2="18" y2="52" stroke="#c8a878" stroke-width="1"/>
    <!-- Check mark -->
    <path d="M19 46 L21 48 L24 44" stroke="#6abf7b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </svg>`,
};

// Category: accent colour + emoji fallback
const CAT = {
  discovery:    { color: '#7eb8d4', emoji: '📣' },
  productivity: { color: '#a8c97e', emoji: '⚙️' },
  finance:      { color: '#e8a84a', emoji: '💰' },
  intelligence: { color: '#c47eb8', emoji: '🕵️' },
  security:     { color: '#7eb8a0', emoji: '🛡️' },
  data:         { color: '#7e9eb8', emoji: '🍳' },
  quality:      { color: '#d4a07e', emoji: '🔍' },
};
const DEFAULT_CAT = { color: '#c8832a', emoji: '🤖' };

function cfg(cat) { return CAT[cat] || DEFAULT_CAT; }

function tier(hbar) {
  if (!hbar || hbar === 0) return { label: 'Free',  color: '#7a6a52' };
  if (hbar <= 2)           return { label: 'Entry', color: '#7eb8d4' };
  if (hbar <= 10)          return { label: 'Core',  color: '#a8c97e' };
  if (hbar <= 25)          return { label: 'Pro',   color: '#c47eb8' };
  return                          { label: 'Elite', color: '#e8a84a' };
}

function usdLine(hbar) {
  if (!hbarPrice || !hbar) return '';
  return `<div class="usd-row">~ $${(hbar * hbarPrice).toFixed(2)} USD</div>`;
}

function cardHtml(agent, i) {
  const c  = cfg(agent.category);
  const t  = tier(agent.price_hbar);
  const h  = agent.price_hbar || 0;
  const av = agent.avatar_url
    ? `<img src="${agent.avatar_url}" alt="${agent.name}" />`
    : (AVATARS[agent.name] || c.emoji);

  return `
    <div class="agent-card" style="--card-accent:${c.color}; animation-delay:${i * 0.07}s">
      <div class="agent-avatar-zone">
        <div class="agent-avatar">${av}</div>
        <div class="agent-avatar-info">
          <div class="agent-name">${agent.name}</div>
          <div class="agent-meta">
            <span class="agent-category">${agent.category || 'agent'}</span>
            <span class="live-dot" title="Active"></span>
          </div>
        </div>
        <div class="tier-badge" style="--tier-color:${t.color}">${t.label}</div>
      </div>

      <div class="agent-body">
        <div>
          <p class="agent-desc" id="d${i}">${agent.description || 'No description.'}</p>
          <button class="expand-btn" onclick="toggleDesc(${i},this)">Read more &darr;</button>
        </div>
        ${agent.tags && agent.tags.length
          ? `<div class="agent-tags">${agent.tags.map(t=>`<span class="agent-tag">${t}</span>`).join('')}</div>`
          : ''}
      </div>

      <div class="agent-footer">
        <div class="agent-price">
          ${h === 0
            ? `<div class="hbar-row"><strong>Free</strong></div>`
            : `<div class="hbar-row"><strong>${h}</strong><span>HBAR</span></div>${usdLine(h)}`
          }
        </div>
        ${agent.endpoint_url
          ? `<a class="hire-btn" href="${agent.endpoint_url}" target="_blank" rel="noopener">Hire agent &rarr;</a>`
          : `<span class="hire-btn disabled">Coming soon</span>`}
      </div>
    </div>`;
}

function toggleDesc(i, btn) {
  const el = document.getElementById('d' + i);
  const ex = el.classList.toggle('expanded');
  btn.innerHTML = ex ? 'Show less &uarr;' : 'Read more &darr;';
}

function renderGrid(agents) {
  const grid  = document.getElementById('grid');
  const count = document.getElementById('count');
  const state = document.getElementById('state');
  if (!agents.length) {
    state.style.display = 'block';
    state.innerHTML = `<span class="state-icon">&#x2615;</span><p class="state-title">No agents found</p><p class="state-body">Nothing matches this filter yet. Check back soon.</p>`;
    count.style.display = 'none';
    grid.innerHTML = '';
    return;
  }
  state.style.display = 'none';
  count.style.display = 'block';
  count.innerHTML = `Showing <span>${agents.length}</span> agent${agents.length === 1 ? '' : 's'}`;
  grid.innerHTML = agents.map((a, i) => cardHtml(a, i)).join('');
}

function applyFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderGrid(f === 'all' ? allAgents : allAgents.filter(a => a.category === f));
}

async function fetchHbar() {
  try {
    const d = await (await fetch(BINANCE)).json();
    hbarPrice = parseFloat(d.price) || null;
    const el = document.getElementById('hbar-price');
    if (el && hbarPrice) el.textContent = '$' + hbarPrice.toFixed(4);
    if (allAgents.length) applyFilter(activeFilter);
  } catch(e) {}
}

async function loadAgents() {
  try {
    const d = await (await fetch(API)).json();
    allAgents = d.agents || [];
    applyFilter(activeFilter);
  } catch(err) {
    document.getElementById('state').innerHTML = `
      <span class="state-icon">&#x26A0;</span>
      <p class="state-title">Could not load agents</p>
      <p class="state-body">${err.message}</p>`;
  }
}

document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => applyFilter(b.dataset.filter)));

loadAgents();
fetchHbar();
setInterval(fetchHbar, 60000);
</script>
</body>
</html>
