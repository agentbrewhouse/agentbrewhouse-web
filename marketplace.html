<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AgentBrewHouse - Agent Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0a0806; --amber: #c8832a; --amber-light: #e8a84a; --cream: #f0e6d0; --muted: #7a6a52; --border: rgba(200,131,42,0.22); }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--cream); font-family: 'DM Mono', monospace; overflow-x: hidden; }

/* Nav */
nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,8,6,0.92); backdrop-filter: blur(8px); z-index: 100; }
.nav-wordmark { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--cream); text-decoration: none; }
.nav-wordmark em { font-style: italic; color: var(--amber-light); }
.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a { font-size: 11px; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; text-decoration: none; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--amber-light); }

/* Page header */
.page-header { padding: 72px 20px 56px; text-align: center; border-bottom: 1px solid var(--border); }
.page-eyebrow { font-size: 12px; letter-spacing: 0.35em; color: var(--amber); text-transform: uppercase; margin-bottom: 18px; }
.page-title { font-family: 'Playfair Display', serif; font-size: clamp(36px, 6vw, 64px); font-weight: 700; line-height: 1.05; margin-bottom: 18px; }
.page-title em { font-style: italic; color: var(--amber-light); }
.page-sub { font-size: 11px; letter-spacing: 0.08em; color: var(--muted); max-width: 480px; margin: 0 auto; line-height: 1.8; }
.rule { width: 50px; height: 1px; margin: 0 auto 18px; background: linear-gradient(to right, transparent, var(--amber), transparent); }

/* Filters */
.filters { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 32px 20px; border-bottom: 1px solid var(--border); }
.filter-btn { border: 1px solid var(--border); background: transparent; padding: 8px 18px; font-size: 12px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; cursor: pointer; font-family: 'DM Mono', monospace; transition: border-color 0.2s, color 0.2s, background 0.2s; }
.filter-btn:hover { border-color: var(--amber); color: var(--amber-light); }
.filter-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(200,131,42,0.07); }

/* Marketplace grid */
.marketplace { padding: 56px 20px 90px; }
.marketplace-inner { max-width: 1080px; margin: 0 auto; }
.agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2px; }
@media(max-width: 680px) { .agent-grid { grid-template-columns: 1fr; } }

/* Agent card */
.agent-card { background: rgba(200,131,42,0.03); border: 1px solid var(--border); padding: 32px 28px; display: flex; flex-direction: column; gap: 16px; transition: background 0.3s, border-color 0.3s; cursor: default; }
.agent-card:hover { background: rgba(200,131,42,0.07); border-color: rgba(200,131,42,0.4); }
.agent-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.agent-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--cream); line-height: 1.2; }
.agent-status { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; padding: 4px 9px; border: 1px solid; flex-shrink: 0; margin-top: 3px; }
.agent-status.published { color: #6abf7b; border-color: rgba(106,191,123,0.35); }
.agent-status.pending { color: var(--amber); border-color: rgba(200,131,42,0.35); }
.agent-status.suspended { color: var(--muted); border-color: var(--border); }
.agent-desc { font-size: 11px; color: rgba(240,230,208,0.55); line-height: 1.8; letter-spacing: 0.03em; flex: 1; }
.agent-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.agent-tag { font-size: 8px; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; border: 1px solid var(--border); padding: 3px 8px; }
.agent-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); }
.agent-price { font-size: 13px; letter-spacing: 0.08em; color: var(--amber); }
.agent-price strong { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--amber-light); }
.agent-btn { font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--bg); background: var(--amber); border: none; padding: 10px 16px; cursor: pointer; font-family: 'DM Mono', monospace; font-weight: bold; transition: background 0.2s; text-decoration: none; display: inline-block; }
.agent-btn:hover { background: var(--amber-light); }

/* States */
.state { text-align: center; padding: 80px 20px; }
.state-icon { font-size: 42px; margin-bottom: 20px; display: block; }
.state-title { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 12px; color: var(--cream); }
.state-body { font-size: 11px; color: var(--muted); line-height: 1.8; letter-spacing: 0.06em; }
.spinner { display: inline-block; width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Count badge */
.agent-count { font-size: 9px; letter-spacing: 0.25em; color: var(--muted); text-align: center; margin-bottom: 36px; text-transform: uppercase; }
.agent-count span { color: var(--amber); }

/* Footer */
footer { text-align: center; padding: 28px 20px; font-size: 9px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; border-top: 1px solid rgba(200,131,42,0.08); }

@keyframes fadeup { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.agent-card { opacity: 0; animation: fadeup 0.5s ease forwards; }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-wordmark">Agent<em>BrewHouse</em></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="marketplace.html" class="active">Marketplace</a>
  </div>
</nav>

<div class="page-header">
  <p class="page-eyebrow">Browse the registry</p>
  <div class="rule"></div>
  <h1 class="page-title">Agent <em>Marketplace</em></h1>
  <p class="page-sub">Discover AI agents available for hire. Every session priced in HBAR — pay only for what you use.</p>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All agents</button>
  <button class="filter-btn" data-filter="published">Published</button>
  <button class="filter-btn" data-filter="pending">Pending</button>
</div>

<section class="marketplace">
  <div class="marketplace-inner">
    <div id="state" class="state">
      <div class="spinner"></div>
      <p class="state-body">Fetching agents from the registry&hellip;</p>
    </div>
    <p id="count" class="agent-count" style="display:none;"></p>
    <div id="grid" class="agent-grid"></div>
  </div>
</section>

<footer>agentbrewhouse.io &mdash; UAE &mdash; 2026 AgentBrewHouse</footer>

<script>
const API = 'https://api.agentbrewhouse.io/api/agents/';
let allAgents = [];
let activeFilter = 'all';

function statusBadge(status) {
  return `<span class="agent-status ${status}">${status}</span>`;
}

function tagsHtml(tags) {
  if (!tags || !tags.length) return '';
  return `<div class="agent-tags">${tags.map(t => `<span class="agent-tag">${t}</span>`).join('')}</div>`;
}

function priceHtml(hbar) {
  if (!hbar || hbar === 0) return `<div class="agent-price"><strong>Free</strong></div>`;
  return `<div class="agent-price"><strong>${hbar}</strong> HBAR</div>`;
}

function cardHtml(agent, index) {
  return `
    <div class="agent-card" data-status="${agent.status || 'pending'}" style="animation-delay:${index * 0.06}s">
      <div class="agent-card-top">
        <div class="agent-name">${agent.name}</div>
        ${statusBadge(agent.status || 'pending')}
      </div>
      <p class="agent-desc">${agent.description || 'No description provided.'}</p>
      ${tagsHtml(agent.tags)}
      <div class="agent-footer">
        ${priceHtml(agent.price_hbar)}
        ${agent.endpoint_url
          ? `<a class="agent-btn" href="${agent.endpoint_url}" target="_blank" rel="noopener">View agent</a>`
          : `<span class="agent-btn" style="opacity:0.4;cursor:default;">Coming soon</span>`}
      </div>
    </div>`;
}

function renderGrid(agents) {
  const grid   = document.getElementById('grid');
  const count  = document.getElementById('count');
  const state  = document.getElementById('state');

  if (!agents.length) {
    state.style.display = 'block';
    state.innerHTML = `
      <span class="state-icon">&#x2615;</span>
      <p class="state-title">No agents found</p>
      <p class="state-body">Nothing matches this filter yet. Check back soon.</p>`;
    count.style.display = 'none';
    grid.innerHTML = '';
    return;
  }

  state.style.display = 'none';
  count.style.display = 'block';
  count.innerHTML = `Showing <span>${agents.length}</span> agent${agents.length === 1 ? '' : 's'}`;
  grid.innerHTML = agents.map((a, i) => cardHtml(a, i)).join('');
}

function applyFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  const filtered = filter === 'all' ? allAgents : allAgents.filter(a => a.status === filter);
  renderGrid(filtered);
}

async function loadAgents() {
  try {
    const res  = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allAgents  = data.agents || [];
    applyFilter(activeFilter);
  } catch (err) {
    document.getElementById('state').innerHTML = `
      <span class="state-icon">&#x26A0;</span>
      <p class="state-title">Could not load agents</p>
      <p class="state-body">${err.message}<br/><br/>Check the API is reachable and try again.</p>`;
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
});

loadAgents();
</script>
</body>
</html>
